<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الموقع قيد الصيانة</title>

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        font-family: Arial, sans-serif;
        color: #fff;
        text-align: center;
    }

    .container {
        max-width: 600px;
        padding: 30px;
        animation: fadeIn 1.5s ease-in-out;
    }

    h1 {
        font-size: 40px;
        margin-bottom: 10px;
        color: #facc15;
    }

    p {
        font-size: 18px;
        line-height: 1.8;
        color: #e2e8f0;
    }

    .icon {
        font-size: 70px;
        margin-bottom: 20px;
        animation: spin 4s linear infinite;
    }

    .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 25px;
        background: #facc15;
        color: #000;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn:hover {
        background: #eab308;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body>

<div class="container">
    <div class="icon">⚙️</div>
    <h1>الموقع قيد الصيانة</h1>
    <p>
        نعتذر عن الإزعاج، نحن نعمل حالياً على تحسين وتطوير الموقع<br>
        لتقديم تجربة أفضل وأسرع لكم.<br><br>
        سيتم العودة قريباً بإذن الله.
    </p>

    <a href="#" class="btn">نشكركم على الصبر</a>
</div>

</body>
</html>
